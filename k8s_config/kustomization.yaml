apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - victoriametrics.yaml
  - vmagent.yaml

configMapGenerator:
  - name: vmagent-config
    literals:
      - |
        scrape.yml=global:
          scrape_interval: 30s
        scrape_configs:
          - job_name: airflow-statsd
            static_configs:
              - targets:
                  # 차트 내장 statsd-exporter 서비스 (airflow 네임스페이스)
                  - airflow-statsd.airflow.svc.cluster.local:9102
