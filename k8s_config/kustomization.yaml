apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# victoriametrics 는 raw manifest 유지
resources:
  - victoriametrics.yaml

# vmagent 은 공식 helm chart 를 kustomize Helm inflation 으로 펼쳐 함께 관리.
# (ArgoCD 에서 동작하려면 argocd-cm 에 kustomize.buildOptions: --enable-helm 필요)
helmCharts:
  - name: victoria-metrics-agent
    repo: https://victoriametrics.github.io/helm-charts
    version: 0.41.2
    releaseName: vmagent
    namespace: monitoring
    valuesFile: vmagent-values.yaml
