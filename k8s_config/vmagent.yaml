apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmagent
  labels:
    app.kubernetes.io/name: vmagent
    app.kubernetes.io/instance: vmagent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmagent
  labels:
    app.kubernetes.io/name: vmagent
    app.kubernetes.io/instance: vmagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmagent
      app.kubernetes.io/instance: vmagent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmagent
        app.kubernetes.io/instance: vmagent
    spec:
      serviceAccountName: vmagent
      containers:
        - name: vmagent
          image: victoriametrics/vmagent:v1.103.0
          imagePullPolicy: IfNotPresent
          args:
            - -promscrape.config=/config/scrape.yml
            - -remoteWrite.url=http://vmsingle.monitoring.svc.cluster.local:8428/api/v1/write
            - -remoteWrite.tmpDataPath=/tmpData
          ports:
            - name: http
              containerPort: 8429
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmpdata
              mountPath: /tmpData
      volumes:
        - name: config
          configMap:
            name: vmagent-config
        - name: tmpdata
          emptyDir: {}
