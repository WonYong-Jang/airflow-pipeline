# VictoriaMetrics single-node (저장소 + 쿼리)
# 서비스: vmsingle.monitoring.svc.cluster.local:8428
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmsingle
  labels:
    app.kubernetes.io/name: vmsingle
    app.kubernetes.io/instance: vmsingle
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmsingle
  labels:
    app.kubernetes.io/name: vmsingle
    app.kubernetes.io/instance: vmsingle
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmsingle
      app.kubernetes.io/instance: vmsingle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmsingle
        app.kubernetes.io/instance: vmsingle
    spec:
      serviceAccountName: vmsingle
      containers:
        - name: vmsingle
          image: victoriametrics/victoria-metrics:v1.103.0
          imagePullPolicy: IfNotPresent
          args:
            - -retentionPeriod=1w
            - -storageDataPath=/storage
            - -httpListenAddr=:8428
          ports:
            - name: http
              containerPort: 8428
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: storage
              mountPath: /storage
      volumes:
        # persistentVolume.enabled=false 와 동일하게 emptyDir 사용 (재시작 시 데이터 휘발)
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle
  labels:
    app.kubernetes.io/name: vmsingle
    app.kubernetes.io/instance: vmsingle
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vmsingle
    app.kubernetes.io/instance: vmsingle
  ports:
    - name: http
      port: 8428
      targetPort: http
