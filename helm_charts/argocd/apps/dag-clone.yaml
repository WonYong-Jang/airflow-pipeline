# DAG 배포(러너 시뮬레이션) - deploy/dag-clone 의 CronJob/ConfigMap 을 관리.
# airflow 차트가 airflow-dags PVC 를 만든 뒤(sync-wave 2) 배치되도록 이후 wave.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dag-clone
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io # App 삭제 시 자식 리소스도 cascade 삭제
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  source:
    repoURL: https://github.com/WonYong-Jang/airflow-pipeline.git
    targetRevision: main
    path: deploy/dag-clone
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
