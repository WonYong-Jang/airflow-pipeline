# 번들 코드 동기화(PVC populate) — deploy/bundle-sync 관리.
# airflow(wave 2)가 airflow-bundles PVC 를 마운트하므로, PVC 생성 + 최초 populate Job 이
# 먼저 끝나도록 더 앞선 wave(1)에 둔다. (ArgoCD 는 앞 wave App 이 Healthy 될 때까지 대기)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bundle-sync
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: airflow
  source:
    repoURL: https://github.com/WonYong-Jang/airflow-pipeline.git
    targetRevision: main
    path: deploy/bundle-sync
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
