# ────────────────────────────────────────────────────────────────────────────
# 번들 코드 동기화 (PVC 방식)
#
# DAG 번들 클래스(feature_branch_bundle 패키지)는 airflow 의 모든 컴포넌트
# (scheduler/dag-processor/worker/api)의 PYTHONPATH 에 있어야 import 된다.
# 커스텀 이미지를 굽는 대신, 레포의 bundles/feature_branch_bundle 를
# 공유 PVC(airflow-bundles)로 복사하고, airflow 파드들이 read-only 로 마운트한다.
#   values: volumes/volumeMounts(/opt/airflow/bundles) + env PYTHONPATH
#
#   PVC       : 번들 코드 저장소 (RWO, minikube 단일 노드라 파드 공유 가능)
#   ConfigMap : 복사 스크립트
#   Job       : 최초 1회 populate (ArgoCD sync-wave 1 → airflow(wave 2) 보다 먼저 완료)
#   CronJob   : 코드 변경 반영(10분 주기)
# ────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: airflow-bundles
  namespace: airflow
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 128Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bundle-sync
  namespace: airflow
data:
  sync.sh: |
    #!/bin/sh
    set -eu
    BRANCH="${BRANCH:-main}"
    DEST=/mnt/bundles
    SRC=/tmp/repo
    echo "[bundle-sync] clone $REPO_URL@$BRANCH"
    rm -rf "$SRC"
    git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$SRC"

    if [ ! -d "$SRC/bundles/feature_branch_bundle" ]; then
      echo "[bundle-sync] ERROR: bundles/feature_branch_bundle not found in repo"
      exit 1
    fi

    mkdir -p "$DEST"
    # 준비 후 원자적 교체(파싱 중 반쪽 상태 노출 방지)
    rm -rf "$DEST/.tmp_fbb"
    cp -R "$SRC/bundles/feature_branch_bundle" "$DEST/.tmp_fbb"
    find "$DEST/.tmp_fbb" -name '__pycache__' -type d -prune -exec rm -rf {} + 2>/dev/null || true
    rm -rf "$DEST/feature_branch_bundle"
    mv "$DEST/.tmp_fbb" "$DEST/feature_branch_bundle"
    echo "[bundle-sync] synced -> $DEST/feature_branch_bundle"
    ls -1 "$DEST/feature_branch_bundle"
---
# 최초 populate (airflow 시작 전에 완료되어야 함 → 별도 App wave 1 로 gating)
apiVersion: batch/v1
kind: Job
metadata:
  name: bundle-sync-init
  namespace: airflow
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: sync
          image: alpine/git:2.45.2
          command: ["/bin/sh", "/scripts/sync.sh"]
          env:
            - name: REPO_URL
              value: https://github.com/WonYong-Jang/airflow-pipeline.git
            - name: BRANCH
              value: main
          volumeMounts:
            - { name: bundles, mountPath: /mnt/bundles }
            - { name: script, mountPath: /scripts }
      volumes:
        - name: bundles
          persistentVolumeClaim: { claimName: airflow-bundles }
        - name: script
          configMap: { name: bundle-sync }
---
# 코드 변경 반영 (bundle-sync-init 이후 지속 동기화)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bundle-sync
  namespace: airflow
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: alpine/git:2.45.2
              command: ["/bin/sh", "/scripts/sync.sh"]
              env:
                - name: REPO_URL
                  value: https://github.com/WonYong-Jang/airflow-pipeline.git
                - name: BRANCH
                  value: main
              volumeMounts:
                - { name: bundles, mountPath: /mnt/bundles }
                - { name: script, mountPath: /scripts }
          volumes:
            - name: bundles
              persistentVolumeClaim: { claimName: airflow-bundles }
            - name: script
              configMap: { name: bundle-sync }
